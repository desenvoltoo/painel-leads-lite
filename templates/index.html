<!-- Filtros Dinâmicos -->
<div class="card filters-container">
    <div class="card-header">
        <h2>Filtros Dinâmicos</h2>
        <p>Seleção múltipla com busca. Filtros já alinhados ao novo Modelo Estrela.</p>
    </div>

    <div class="filters-grid">
        <!-- Linha 1 -->
        <div class="filter-group">
            <label for="fStatus">Status (Multi)</label>
            <select id="fStatus" multiple placeholder="Todos os status..."></select>
        </div>
        <div class="filter-group">
            <label for="fCurso">Cursos (Multi)</label>
            <select id="fCurso" multiple placeholder="Todos os cursos..."></select>
        </div>
        <div class="filter-group">
            <label for="fModalidade">Modalidade (Multi)</label>
            <select id="fModalidade" multiple placeholder="Todas as modalidades..."></select>
        </div>

        <!-- Linha 2 -->
        <div class="filter-group">
            <label for="fTurno">Turno (Multi)</label>
            <select id="fTurno" multiple placeholder="Todos os turnos..."></select>
        </div>
        <div class="filter-group">
            <label for="fPolo">Polos (Multi)</label>
            <select id="fPolo" multiple placeholder="Todos os polos..."></select>
        </div>
        <div class="filter-group">
            <label for="fOrigem">Origem (Multi)</label>
            <select id="fOrigem" multiple placeholder="Todas as origens..."></select>
        </div>

        <!-- Linha 3 -->
        <div class="filter-group">
            <label for="fConsultorDisparo">Consultor Disparo (Multi)</label>
            <select id="fConsultorDisparo" multiple placeholder="Todos os consultores..."></select>
        </div>
        <div class="filter-group">
            <label for="fConsultorComercial">Consultor Comercial (Multi)</label>
            <select id="fConsultorComercial" multiple placeholder="Todos os consultores..."></select>
        </div>
        <div class="filter-group">
            <label for="fCanal">Canal (Multi)</label>
            <select id="fCanal" multiple placeholder="Todos os canais..."></select>
        </div>

        <!-- Linha 4 -->
        <div class="filter-group">
            <label for="fCampanha">Campanha (Multi)</label>
            <select id="fCampanha" multiple placeholder="Todas as campanhas..."></select>
        </div>
        <div class="filter-group">
            <label for="fTipoDisparo">Tipo Disparo (Multi)</label>
            <select id="fTipoDisparo" multiple placeholder="Todos os tipos..."></select>
        </div>
        <div class="filter-group">
            <label for="fTipoNegocio">Tipo Negócio (Multi)</label>
            <select id="fTipoNegocio" multiple placeholder="Todos os tipos..."></select>
        </div>
    </div>

    <!-- Controles de Rodapé e Busca Rápida -->
    <div class="bottom-controls-grid">
        <!-- Bloco de Data e Limite -->
        <div class="date-and-options">
            <div class="filter-group">
                <label>Data Inicial</label>
                <input type="date" id="fIni">
            </div>
            <div class="filter-group">
                <label>Data Final</label>
                <input type="date" id="fFim">
            </div>
            <div class="filter-group">
                <label>Matriculado</label>
                <select id="fMatriculado">
                    <option value="">Todos</option>
                    <option value="true">Sim</option>
                    <option value="false">Não</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Limite</label>
                <input type="number" id="fLimit" value="500">
            </div>
        </div>

        <!-- Bloco de Ações e Filtros Salvos -->
        <div class="action-buttons-group">
            <button id="btnApply" class="btn-primary">Aplicar Filtros</button>
            <button id="btnClear" class="btn-secondary">Limpar Tudo</button>
            
            <div class="saved-filters-area">
                <select id="fSaved" class="select-saved" placeholder="Filtros salvos..."></select>
                <button id="btnSaveFilter" class="btn-text">Salvar Filtro</button>
            </div>
        </div>

        <!-- Bloco de Busca Rápida -->
        <div class="quick-search-area">
            <label for="fBusca">Busca rápida (Nome / CPF / Celular / Email)</label>
            <input type="text" id="fBusca" placeholder="Ex.: Maria / 12345678900 /">
            <p class="helper-text">O painel detecta automaticamente o tipo de busca e envia os parâmetros corretos.</p>
        </div>
    </div>
</div>
