<!doctype html>
<html lang="pt-br">
<head>
  <!-- Página de autenticação dedicada -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login | Painel Leads Lite</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css', v=asset_version) }}">
</head>
<body class="auth-body">
  <main class="auth-page">
    <section class="auth-card">
      <h1>Entrar no painel</h1>
      <p class="muted">Use um dos usuários autorizados para acessar os leads (rota: /login).</p>

      <div class="field">
        <label for="loginUser">Usuário</label>
        <input id="loginUser" placeholder="matheus ou miguel" autocomplete="username" />
      </div>

      <div class="field">
        <label for="loginPass">Senha</label>
        <input id="loginPass" type="password" placeholder="Digite sua senha" autocomplete="current-password" />
      </div>

      <button id="btnLogin" class="btn btn-primary auth-btn">Entrar</button>
      <div id="loginStatus" class="muted"></div>

      <div class="muted auth-help">
        Usuários iniciais: <strong>matheus</strong> e <strong>miguel</strong>.<br>
        Senha padrão inicial: <strong>123456</strong>.
      </div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/login.js', v=asset_version) }}"></script>
</body>
</html>
